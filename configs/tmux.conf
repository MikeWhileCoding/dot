# tmux.conf — managed by dot CLI
# Edit in dotfiles repo, not in-place

# ── General ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on

# Faster escape for vim/neovim
set -sg escape-time 10

# Start window and pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefix ────────────────────────────────────────────────────────────
# Remap prefix to Ctrl+a (easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ────────────────────────────────────────────────────────────
# Intuitive split keys (and open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ── Navigation ────────────────────────────────────────────────────────
# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode ─────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Status bar ────────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "fg=white,bg=black"
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=yellow] %H:%M "
set -g status-left-length 30

# Active window highlight
setw -g window-status-current-style "fg=black,bg=green,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ── Reload ────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
